<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<header class="bg-blue-600 text-white p-4">
    <h1 class="text-xl font-bold">Stock Dashboard</h1>
</header>

<section class="bg-white p-4 shadow">
    <div>Last Updated: <span id="last-updated">Loading...</span></div>
    <div>Market: <span id="market-status">-</span></div>
    <div>Yahoo: <span id="yahoo-status">Loading...</span></div>
</section>

<section class="grid grid-cols-4 gap-4 p-4">
    <div>Total: <span id="total-stocks"></span></div>
    <div>Swing: <span id="swing-count"></span></div>
    <div>Long: <span id="longterm-count"></span></div>
    <div>Fallback: <span id="active-flags"></span></div>
</section>

<section class="p-4">

<div id="loading-state">Loading dashboard...</div>
<div id="error-state" class="hidden text-red-600">Error loading data</div>

<table class="w-full bg-white shadow">
<thead class="bg-gray-200">
<tr>
<th>Ticker</th>
<th>Strategy</th>
<th>Entry</th>
<th>Current</th>
<th>Performance</th>
<th>Source</th>
<th>Status</th>
</tr>
</thead>

<tbody id="table-body"></tbody>
</table>

</section>

<script src="assets/js/dashboard.js"></script>

</body>
</html>
